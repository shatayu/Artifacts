name: Artifacts

options:
  bundleIdPrefix: com.shatayu
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

configFiles:
  Debug: Artifacts/Configuration/Config-Local.xcconfig
  Release: Artifacts/Configuration/Config-Prod.xcconfig

targets:
  Artifacts:
    type: application
    platform: iOS
    sources:
      - path: Artifacts
        excludes:
          - "Configuration/Config-*.xcconfig"
          - "Configuration/*.xcconfig"
    info:
      path: Artifacts/Info.plist
      properties:
        CFBundleDisplayName: Artifacts
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        API_BASE_URL: $(API_BASE_URL)
        API_KEY: $(API_KEY)
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.shatayu.Artifacts
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
